<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dimensionador Elétrico</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.resultado{
    margin-top:20px;
    padding:15px;
    background:#eef7ee;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="card">

<h1>Dimensionador de Cabos</h1>

<label>Corrente (A)</label>
<input id="corrente" type="number">

<label>Tensão</label>
<select id="tensao">
    <option value="127">127 V</option>
    <option value="220">220 V</option>
    <option value="380">380 V</option>
</select>

<label>Distância (m)</label>
<input id="distancia" type="number">

<label>Material</label>
<select id="material">
    <option value="cobre">Cobre</option>
    <option value="aluminio">Alumínio</option>
</select>

<label>Instalação</label>
<select id="instalacao">
    <option>Eletroduto Embutido</option>
    <option>Eletroduto Aparente</option>
    <option>Ao Ar Livre</option>
    <option>Enterrado</option>
</select>

<button onclick="calcular()">
Calcular
</button>

<div id="resultado" class="resultado"></div>

</div>

<script>

function calcular(){

    const corrente =
        Number(document.getElementById("corrente").value);

    const tensao =
        Number(document.getElementById("tensao").value);

    const distancia =
        Number(document.getElementById("distancia").value);

    const material =
        document.getElementById("material").value;

    const rho =
        material === "cobre"
        ? 0.0175
        : 0.0282;

    const bitolas =
        [1.5,2.5,4,6,10,16,25,35,50,70,95,120];

    let melhor = null;

    for(const bitola of bitolas){

        const queda =
            (2 * rho * distancia * corrente)
            / bitola;

        const percentual =
            (queda / tensao) * 100;

        if(percentual <= 4){

            melhor = {
                bitola,
                queda,
                percentual
            };

            break;
        }
    }

    if(!melhor){

        document.getElementById("resultado").innerHTML =
        "Nenhuma bitola encontrada.";

        return;
    }

    document.getElementById("resultado").innerHTML = `
        <h2>Resultado</h2>

        <p><b>Bitola Recomendada:</b>
        ${melhor.bitola} mm²</p>

        <p><b>Queda de Tensão:</b>
        ${melhor.queda.toFixed(2)} V</p>

        <p><b>Percentual:</b>
        ${melhor.percentual.toFixed(2)}%</p>
    `;
}

</script>

</body>
</html>
